<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Party · 多人游戏推荐</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #667eea;
    --accent2: #764ba2;
    --text: #e0e0e0;
    --muted: #888;
    --border: #2a2a4a;
    --danger: #e05555;
    --success: #4caf84;
    --chip: #15152a;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .container { max-width: 860px; width: 100% }

  /* Header */
  .header {
    text-align: center; padding: 32px 0 24px;
  }
  .header h1 {
    font-size: 2.2em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .header p { color: var(--muted); font-size: 0.95em }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
  .card h2 { font-size: 1.15em; color: var(--accent); margin-bottom: 14px }

  /* Inputs */
  .input-wrap { position: relative }
  .input-wrap input {
    width: 100%; padding: 13px 16px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-size: 1em; outline: none; transition: border .2s;
  }
  .input-wrap input:focus { border-color: var(--accent) }
  .input-wrap input::placeholder { color: #444 }
  .hint { font-size: 0.8em; color: var(--muted); margin-top: 6px }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 11px 24px; border: none; border-radius: var(--radius);
    font-size: 1em; cursor: pointer; transition: all .2s;
    font-family: inherit;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; width: 100%; margin-top: 12px;
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px) }
  .btn-outline {
    background: transparent; border: 1px solid var(--accent);
    color: var(--accent); flex: 1; text-align: center;
  }
  .btn-outline:hover { background: rgba(102,126,234,0.1) }
  .btn-sm {
    padding: 6px 14px; font-size: 0.85em;
    background: var(--accent); color: #fff; border-radius: 6px;
  }

  /* Two-column for mode selection */
  .mode-grid { display: flex; gap: 12px; flex-wrap: wrap }

  /* Share box */
  .share-bar {
    display: flex; gap: 8px; align-items: center;
    background: var(--chip); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; margin-top: 10px;
  }
  .share-bar code {
    flex: 1; font-size: 0.85em; color: var(--accent);
    word-break: break-all; user-select: all;
  }

  /* Player chips */
  .players { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px }
  .player-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--chip); border: 1px solid var(--border);
    border-radius: 24px; padding: 7px 14px 7px 7px;
  }
  .player-chip img { width: 30px; height: 30px; border-radius: 50% }
  .player-chip .pname { font-weight: 600; font-size: 0.9em }
  .player-chip .pgames { font-size: 0.75em; color: var(--muted) }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 0 }
  .tab {
    flex: 1; padding: 10px; text-align: center; cursor: pointer;
    background: var(--chip); border-radius: 8px 8px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    font-size: 0.9em; transition: background .2s;
  }
  .tab.active { background: var(--card); color: var(--accent); font-weight: 600 }
  .tab:hover:not(.active) { background: rgba(102,126,234,0.08) }

  /* Game rows */
  .game-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-bottom: 1px solid rgba(42,42,74,0.4);
    font-size: 0.9em;
  }
  .game-row .gname { font-weight: 500 }
  .game-row .gmeta { color: var(--muted); font-size: 0.85em; white-space: nowrap }

  /* Recommendation cards */
  .rec-item {
    background: var(--chip); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px;
  }
  .rec-item .rec-title { font-weight: 600; margin-bottom: 6px }
  .rec-item .rec-meta { font-size: 0.82em; display: flex; flex-wrap: wrap; gap: 4px }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em }
  .tag-own { background: rgba(76,175,132,0.2); color: var(--success) }
  .tag-miss { background: rgba(224,85,85,0.2); color: var(--danger) }

  /* Pair cards */
  .pair-card {
    background: var(--chip); border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
  }
  .pair-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 0.9em }
  .pair-header img { width: 26px; height: 26px; border-radius: 50% }
  .pair-header .count { color: var(--muted); font-size: 0.85em }

  /* States */
  .error-msg { color: var(--danger); background: rgba(224,85,85,0.1); padding: 12px; border-radius: var(--radius); margin-top: 10px }
  .empty { text-align: center; color: var(--muted); padding: 20px; font-size: 0.9em }
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid transparent; border-top-color: #fff;
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 12px 8px }
    .card { padding: 16px }
    .header h1 { font-size: 1.6em }
    .game-row { flex-direction: column; align-items: flex-start; gap: 2px }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Steam Party</h1>
    <p>创建房间，好友加入，一起发现该玩什么</p>
  </div>

  <!-- === MODE SELECTION === -->
  <div id="step-mode" class="card">
    <h2>开始使用</h2>
    <div class="mode-grid">
      <button class="btn btn-outline" onclick="showCreate()">创建新房间</button>
      <button class="btn btn-outline" onclick="showJoin()">加入已有房间</button>
    </div>
  </div>

  <!-- === CREATE === -->
  <div id="step-create" class="card" style="display:none">
    <h2>创建房间</h2>
    <p style="color:var(--muted);margin-bottom:12px">输入你的 Steam ID 或个人资料链接</p>
    <div class="input-wrap">
      <input id="create-steam-id" placeholder="Steam ID64 或 https://steamcommunity.com/id/xxx">
    </div>
    <p class="hint">支持：Steam ID64、自定义 URL、个人资料完整链接</p>
    <button class="btn btn-primary" id="create-btn" onclick="createSession()">创建房间</button>
    <div id="create-error" class="error-msg" style="display:none"></div>
  </div>

  <!-- === SHARE === -->
  <div id="step-share" class="card" style="display:none">
    <h2>房间已创建</h2>
    <p style="color:var(--muted);margin-bottom:8px">分享链接给好友，他们打开就能加入：</p>
    <div class="share-bar">
      <code id="share-url"></code>
      <button class="btn btn-sm" onclick="copyShare()">复制</button>
    </div>
  </div>

  <!-- === JOIN === -->
  <div id="step-join-input" class="card" style="display:none">
    <h2>加入房间</h2>
    <p style="color:var(--muted);margin-bottom:12px">输入你的 Steam ID 加入房间</p>
    <div class="input-wrap">
      <input id="join-steam-id" placeholder="Steam ID64 或 https://steamcommunity.com/id/xxx">
    </div>
    <p class="hint">支持：Steam ID64、自定义 URL、个人资料完整链接</p>
    <button class="btn btn-primary" id="join-btn" onclick="joinSession()">加入房间</button>
    <div id="join-error" class="error-msg" style="display:none"></div>
  </div>

  <!-- === PLAYER LIST === -->
  <div id="step-players" class="card" style="display:none">
    <h2>已加入 (<span id="player-count">0</span> 人)</h2>
    <div id="player-list" class="players"></div>
    <div id="Analyze-btn-wrap">
      <button class="btn btn-primary" id="analyze-ready-btn" onclick="analyze()" style="display:none">开始分析</button>
      <button class="btn btn-primary" id="analyze-wait-btn" disabled style="display:none">需要至少 2 人</button>
    </div>
  </div>

  <!-- === RESULTS === -->
  <div id="step-results" style="display:none">
    <div class="tabs">
      <div class="tab active" data-tab="common" onclick="switchTab('common')">共同游戏</div>
      <div class="tab" data-tab="recs" onclick="switchTab('recs')">推荐补票</div>
      <div class="tab" data-tab="pairs" onclick="switchTab('pairs')">双人交集</div>
    </div>
    <div class="card" style="border-top:none;border-radius:0 0 var(--radius) var(--radius)">
      <div id="tab-common"></div>
      <div id="tab-recs" style="display:none"></div>
      <div id="tab-pairs" style="display:none"></div>
    </div>
    <button class="btn btn-primary" onclick="copyShare()" style="margin-top:12px">复制链接分享结果</button>
  </div>
</div>

<script>
// ─── State ───
let sessionId = null;
let results = null;
let pollTimer = null;

// ─── URL detection (joining via shared link) ───
const urlParams = new URLSearchParams(window.location.search);
const pathMatch = window.location.pathname.match(/\/s\/([a-f0-9]+)/);
const detectedId = urlParams.get('s') || (pathMatch ? pathMatch[1] : null);
if (detectedId) {
  sessionId = detectedId;
  hideAll();
  document.getElementById('step-join-input').style.display = 'block';
  // Add session info to join panel
  document.querySelector('#step-join-input h2').textContent = '加入房间 ' + sessionId;
}

// ─── UI helpers ───
function hideAll() {
  document.querySelectorAll('[id^="step-"]').forEach(el => el.style.display = 'none');
}

function showCreate() {
  hideAll();
  document.getElementById('step-create').style.display = 'block';
}

function showJoin() {
  hideAll();
  document.getElementById('step-join-input').style.display = 'block';
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 6000);
}

// ─── API calls ───
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/x-www-form-urlencoded';
    opts.body = new URLSearchParams(body).toString();
  }
  const resp = await fetch(path, opts);
  const data = await resp.json();
  if (!resp.ok || data.error) {
    throw new Error(data.error || data.detail || '请求失败');
  }
  return data;
}

async function createSession() {
  const steamId = document.getElementById('create-steam-id').value.trim();
  if (!steamId) return showError('create-error', '请输入 Steam ID');
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 创建中...';

  try {
    const data = await api('POST', '/api/session/create', { steam_id: steamId });
    sessionId = data.session_id;
    hideAll();
    // Show share
    const shareUrl = location.origin + location.pathname + '?s=' + sessionId;
    document.getElementById('share-url').textContent = shareUrl;
    document.getElementById('step-share').style.display = 'block';
    // Start polling
    startPolling();
  } catch (e) {
    showError('create-error', e.message);
  } finally {
    btn.disabled = false; btn.textContent = '创建房间';
  }
}

async function joinSession() {
  const steamId = document.getElementById('join-steam-id').value.trim();
  if (!steamId) return showError('join-error', '请输入 Steam ID');
  if (!sessionId) return showError('join-error', '找不到房间 ID，请通过链接加入');
  const btn = document.getElementById('join-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 加入中...';

  try {
    await api('POST', '/api/session/' + sessionId + '/join', { steam_id: steamId });
    hideAll();
    document.getElementById('step-share').style.display = 'block';
    startPolling();
  } catch (e) {
    showError('join-error', e.message);
  } finally {
    btn.disabled = false; btn.textContent = '加入房间';
  }
}

// ─── Polling ───
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollStatus();
  pollTimer = setInterval(pollStatus, 3000);
}

async function pollStatus() {
  if (!sessionId) return;
  try {
    const data = await api('GET', '/api/session/' + sessionId + '/status');
    renderPlayers(data);
    if (data.has_results && !results) {
      await loadResults();
    }
  } catch (e) { /* session expired, etc. */ }
}

function renderPlayers(data) {
  document.getElementById('step-players').style.display = 'block';
  document.getElementById('player-count').textContent = data.player_count;
  const list = document.getElementById('player-list');
  list.innerHTML = data.players.map(p =>
    '<div class="player-chip">' +
    (p.avatar ? '<img src="' + escapeHtml(p.avatar) + '" onerror="this.style.display=\'none\'">' : '') +
    '<span class="pname">' + escapeHtml(p.name) + '</span>' +
    '<span class="pgames">' + (p.game_count || '?') + ' 游戏</span>' +
    '</div>'
  ).join('');

  if (data.player_count >= 2) {
    document.getElementById('analyze-ready-btn').style.display = 'block';
    document.getElementById('analyze-wait-btn').style.display = 'none';
  } else {
    document.getElementById('analyze-ready-btn').style.display = 'none';
    document.getElementById('analyze-wait-btn').style.display = 'block';
  }
}

// ─── Analysis ───
async function analyze() {
  const btn = document.getElementById('analyze-ready-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 分析中...';
  try {
    results = await api('POST', '/api/session/' + sessionId + '/analyze');
    renderResults();
  } catch (e) {
    alert(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '开始分析';
  }
}

async function loadResults() {
  results = await api('GET', '/api/session/' + sessionId + '/results');
  renderResults();
}

function renderResults() {
  if (!results) return;
  hideAll();
  document.getElementById('step-results').style.display = 'block';
  document.getElementById('step-players').style.display = 'block';
  if (pollTimer) clearInterval(pollTimer);

  // Common games
  const common = results.common_games || [];
  document.getElementById('tab-common').innerHTML = common.length
    ? common.map(g => '<div class="game-row"><span class="gname">' + escapeHtml(g.name) + '</span><span class="gmeta">' + Math.round(g.total_hours) + 'h</span></div>').join('')
    : '<div class="empty">没有所有人都拥有的游戏</div>';

  // Recommendations
  const recs = results.recommendations || [];
  document.getElementById('tab-recs').innerHTML = recs.length
    ? recs.map(r =>
        '<div class="rec-item"><div class="rec-title">' + escapeHtml(r.name) + '</div>' +
        '<div class="rec-meta">' +
        r.owned_by.map(n => '<span class="tag tag-own">' + escapeHtml(n) + '</span>').join('') +
        r.missing_for.map(n => '<span class="tag tag-miss">' + escapeHtml(n) + ' 缺</span>').join('') +
        '</div></div>'
      ).join('')
    : '<div class="empty">没有补票建议</div>';

  // Pair overlaps
  const pairs = results.pair_overlaps || [];
  document.getElementById('tab-pairs').innerHTML = pairs.length
    ? pairs.map(pair =>
        '<div class="pair-card">' +
        '<div class="pair-header">' +
        (pair.p1.avatar ? '<img src="' + escapeHtml(pair.p1.avatar) + '" onerror="this.style.display=\'none\'">' : '') +
        '<strong>' + escapeHtml(pair.p1.name) + '</strong>' +
        '<span style="color:var(--muted)">+</span>' +
        (pair.p2.avatar ? '<img src="' + escapeHtml(pair.p2.avatar) + '" onerror="this.style.display=\'none\'">' : '') +
        '<strong>' + escapeHtml(pair.p2.name) + '</strong>' +
        '<span class="count">(' + pair.shared_count + ' 共同)</span>' +
        '</div>' +
        pair.top_shared.map(g =>
          '<div class="game-row"><span class="gname">' + escapeHtml(g.name) + '</span><span class="gmeta">' + Math.round(g.p1_hours) + 'h / ' + Math.round(g.p2_hours) + 'h</span></div>'
        ).join('') +
        '</div>'
      ).join('')
    : '<div class="empty">无数据</div>';
}

// ─── Tabs ───
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="' + name + '"]').classList.add('active');
  document.getElementById('tab-common').style.display = name === 'common' ? 'block' : 'none';
  document.getElementById('tab-recs').style.display = name === 'recs' ? 'block' : 'none';
  document.getElementById('tab-pairs').style.display = name === 'pairs' ? 'block' : 'none';
}

// ─── Copy ───
function copyShare() {
  const url = location.origin + location.pathname + '?s=' + sessionId;
  navigator.clipboard.writeText(url).then(() => {
    const btns = document.querySelectorAll('.btn-sm');
    btns.forEach(b => b.textContent = '已复制');
    setTimeout(() => btns.forEach(b => b.textContent = '复制'), 1500);
  });
}

// ─── Utils ───
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
